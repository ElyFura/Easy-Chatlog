name: Release Easy Chatlog

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to create (e.g. 0.1.8 — leading "v" is stripped)'
        required: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Normalize version
        id: ver
        shell: pwsh
        run: |
          $raw = '${{ github.event.inputs.version }}'.Trim()
          $clean = $raw -replace '^[vV]', ''
          if ($clean -notmatch '^\d+\.\d+\.\d+(\.\d+)?$') {
            Write-Error "Version '$raw' is not a valid SemVer (expected e.g. 0.1.8 or 0.1.8.0)."
            exit 1
          }
          "version=$clean"  | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=v$clean"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

      - name: Restore Dependencies
        run: dotnet restore EasyChatlog/EasyChatlog.csproj

      - name: Build
        run: dotnet build EasyChatlog/EasyChatlog.csproj --no-restore /p:Configuration=Release /p:Version=${{ steps.ver.outputs.version }}

      - name: Upload Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: "./EasyChatlog/bin/Release/EasyChatlog/latest.zip"
          name: Easy Chatlog ${{ steps.ver.outputs.tag }}
          tag: ${{ steps.ver.outputs.tag }}
          draft: false
          token: ${{ secrets.GITHUB_TOKEN }}
          commit: ${{ vars.GITHUB_SHA }}